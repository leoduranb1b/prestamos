<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Préstamos a la Orden</title>
    <style>
        /* Todo el CSS original se mantiene igual */
        :root { --primary: #2563eb; --red: #ef4444; }
        body { font-family: system-ui, -apple-system, sans-serif; margin:0; background:#f8fafc; color:#1e2937; }
        /* ... (el resto del CSS original permanece sin cambios) ... */
    </style>
</head>
<body>
    <!-- Todo el HTML original se mantiene exactamente igual -->
    <!-- ... (todo el contenido HTML que proporcionaste) ... -->

<script>
// Todo el JavaScript anterior permanece igual hasta la función renderHistorialPrestamo

function renderHistorialPrestamo(pid){
  const p=DB.prestamos.find(x=>x.id===pid);if(!p)return;
  const pagos=getPagosPresta(pid).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const card=document.getElementById('pag-hist-card');card.style.display='block';
  const totalPag=pagos.filter(pg=>pg.estado!=='Anulado').reduce((s,pg)=>s+pg.monto,0);
  const totalAnulado=pagos.filter(pg=>pg.estado==='Anulado').reduce((s,pg)=>s+pg.monto,0);
  const mora=calcularMora(p);
  const pct=p.totalCobrar>0?Math.round(totalPag/p.totalCobrar*100):0;
  document.getElementById('pag-hist-resumen').innerHTML=`
    <span>Cobrado: <strong>${fmt(totalPag)}</strong></span>
    <span>Pendiente: <strong>${fmt(Math.max(0,p.totalCobrar-totalPag))}</strong></span>
    <span>Avance: <strong>${pct}%</strong></span>
    ${totalAnulado>0?`<span style="color:var(--red-text)">Anulado: <strong>${fmt(totalAnulado)}</strong></span>`:''}
    ${mora.enMora?`<span style="color:#ef4444">⚠️ En mora: <strong>${mora.dias} día${mora.dias!==1?'s':''}</strong>${mora.recargo>0?' — Recargo: '+fmt(mora.recargo):''}` :''}
  `;
  const tbody=document.getElementById('pag-hist-tabla');
  const pagosActivos=pagos.filter(pg=>pg.estado!=='Anulado');
  tbody.innerHTML=pagos.length===0?'<tr><td colspan="8" class="empty">Sin pagos registrados</td></tr>':
    pagos.map((pg,i)=>{
      const anulado=pg.estado==='Anulado';
      const completa=!anulado&&pg.interesAplicado>=(p.interesCuota*0.99)&&pg.capitalAplicado>=(p.capitalCuota*0.99);
      const badge=anulado?'badge-red':completa?'badge-green':'badge-yellow';
      const label=anulado?'Anulado':completa?'Completo':'Parcial';
      const rowStyle=anulado?'opacity:.5;text-decoration:line-through':'';
      return`<tr style="${rowStyle}">
        <td>${i+1}</td>
        <td>${formatDate(pg.fecha)}</td>
        <td class="num"><strong>${fmt(pg.monto)}</strong></td>
        <td class="num">${fmt(pg.interesAplicado)}</td>
        <td class="num">${fmt(pg.capitalAplicado)}</td>
        <td class="num">${pg.excedente>0?fmt(pg.excedente):'—'}</td>
        <td><span class="badge ${badge}">${label}</span></td>
        <td>${!anulado?`<button class="btn btn-sm btn-danger" onclick="anularPago('${pg.id}')">Anular</button>`:'<span style="font-size:11px;color:var(--text-muted)">anulado</span>'}</td>
      </tr>`;
    }).join('');
  
  const freq=p.frecuencia==='Semanal'?7:15;
  const pagosActCal=pagos.filter(pg=>pg.estado!=='Anulado');
  const capTotal=pagosActCal.reduce((s,pg)=>s+pg.capitalAplicado+pg.excedente,0);
  const intTotal=pagosActCal.reduce((s,pg)=>s+pg.interesAplicado,0);
  const cuotaTotal=p.capitalCuota+p.interesCuota;
  
  const pagoPorCuota={};
  pagosActCal.forEach(pg=>{
    if(pg.cuotaNumero){
      pagoPorCuota[pg.cuotaNumero]=(pagoPorCuota[pg.cuotaNumero]||0)+pg.monto;
    }
  });
  
  const mora2=calcularMora(p);   /* ← Corrección aquí (evita duplicado) */
  
  let html='<div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.03em">Calendario de cuotas</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:8px">';
  for(let i=0;i<p.cuotas;i++){
    const num=i+1;
    const capEsp=num*p.capitalCuota, intEsp=num*p.interesCuota;
    const pagada=capTotal>=capEsp*0.99&&intTotal>=intEsp*0.99;
    const fecha=addDays(p.fechaDesembolso,num*freq);
    const vencida=!pagada&&fecha<today();
    const pagadaEnCuota=pagoPorCuota[num]||0;
    const parcial=!pagada&&pagadaEnCuota>0&&pagadaEnCuota<cuotaTotal;
    const pctCuota=Math.min(100,Math.round(pagadaEnCuota/cuotaTotal*100));
    const cl=pagada?'badge-green':parcial?'badge-yellow':vencida?'badge-red':'badge-gray';
    const icon=pagada?'✓':parcial?`${pctCuota}%`:vencida?'!':'·';
    html+=`<div class="badge ${cl}" style="justify-content:center;padding:8px 4px;border-radius:8px;flex-direction:column;gap:2px" title="Cuota #${num}&#10;${formatDate(fecha)}${parcial?'&#10;Pagado: '+fmt(pagadaEnCuota)+' / '+fmt(cuotaTotal):''}">
      <span style="font-size:12px;font-weight:700">#${num}</span>
      <span style="font-size:9px;opacity:.85">${formatDate(fecha)}</span>
      <span style="font-size:10px;font-weight:600">${icon}</span>
    </div>`;
  }
  html+='</div>';
  if(mora2.enMora){
    html+=`<div class="alert alert-red" style="margin-top:12px;font-size:12px">⚠️ <strong>${mora2.dias} día${mora2.dias!==1?'s':''} en mora</strong>${mora2.recargo>0?' — Recargo: '+fmt(mora2.recargo):''}. Recargo configurado: ${CONFIG.pctMora||0}% semanal.</div>`;
  }
  document.getElementById('pag-cuotas-prog').innerHTML=html;
}

// El resto del script permanece sin cambios
</script>
</body>
</html>
